<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Calla's Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'coffee-dark': '#3e2723',
                        'coffee-medium': '#5d4037',
                        'coffee-light': '#8d6e63',
                        'warm-beige': '#f5f0e6',
                        'creamy-white': '#fcfbf9',
                        'accent': '#d4a373',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #f5f0e6;
            background-image: radial-gradient(#8d6e63 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
        .glass-panel {
            background: rgba(252, 251, 249, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px -10px rgba(62, 39, 35, 0.1);
        }
    </style>
</head>
<body class="font-sans text-coffee-dark antialiased h-screen flex items-center justify-center selection:bg-accent selection:text-white p-6">

    <div class="glass-panel w-full max-w-md rounded-[2rem] p-10 relative overflow-hidden">
        <!-- Decorative blob -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-accent/20 rounded-full blur-2xl"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-coffee-light/20 rounded-full blur-2xl"></div>

        <div class="relative z-10">
            <div class="text-center mb-10">
                <h1 class="font-serif text-3xl font-bold mb-2">Calla's <span class="text-accent italic">Coffee</span></h1>
                <p class="text-coffee-medium text-sm">Dashboard Management System</p>
            </div>

            <form class="space-y-6" onsubmit="event.preventDefault(); window.location.href='/admin/dashboard';">
                <div>
                    <label class="block text-sm font-medium text-coffee-medium mb-2 pl-1">Email Administrator</label>
                    <input type="email" value="admin@callascoffee.com" class="w-full bg-creamy-white border border-coffee-light/30 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-accent/50 transition-all text-sm shadow-sm" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-coffee-medium mb-2 pl-1">Kata Sandi</label>
                    <input type="password" value="password123" class="w-full bg-creamy-white border border-coffee-light/30 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-accent/50 transition-all text-sm shadow-sm" required>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-coffee-dark text-creamy-white hover:bg-coffee-medium transition-all duration-300 font-medium py-4 rounded-2xl shadow-xl shadow-coffee-dark/20 text-lg flex items-center justify-center gap-2 group">
                        <span>Masuk ke Dashboard</span>
                        <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </div>
                
                <div class="text-center mt-6">
                    <a href="/index.html" class="text-sm text-coffee-light hover:text-accent transition-colors">← Kembali ke Landing Page</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
